name: Build, Test and Package Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run unit Test
        run: npm run test:coverage

      - name: Build Application
        run: npm run build

  containerize:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ContainerFile
          tags: runtracker:${{ github.sha }}
          outputs: type=docker, dest=/tmp/runTracker-image.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtracker-docker-image
          path: /tmp/runTracker-image.tar
          retention-days: 7
 